<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сюрприз</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Главная</a>
            <a href="feelings.html">Чувства</a>
            <a href="letter.html">Письмо</a>
            <a href="surprise.html" class="active">Сюрприз</a>
        </nav>
    </header>

    <main class="page surprise">
        <h2>Нажми и почувствуй</h2>
        <button id="heartBtn" class="btn">❤️</button>
        <div id="messageBox" style="display: none; margin-top: 24px; font-size: 28px; color: #f9d976; font-style: italic;">
            Ты — всё, что мне нужно.
        </div>
        <canvas id="confettiCanvas" style="position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 999;"></canvas>
    </main>

    <footer>
        <p>Сделано для тебя</p>
    </footer>

    <script>
        document.getElementById('heartBtn').addEventListener('click', function() {
            const box = document.getElementById('messageBox');
            box.style.display = 'block';
            this.textContent = '❤️ Ты — моя';
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 200);
            startConfetti();
        });

        // ===== КОНФЕТТИ =====
        function startConfetti() {
            const canvas = document.getElementById('confettiCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const pieces = [];
            const colors = ['#f9d976', '#f39cbf', '#b78cfa', '#6dd5fa', '#f5576c', '#fff'];

            for (let i = 0; i < 120; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 10 + 4,
                    h: Math.random() * 6 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    vx: (Math.random() - 0.5) * 2,
                    vy: Math.random() * 3 + 2,
                    rot: Math.random() * 360,
                    rv: (Math.random() - 0.5) * 6
                });
            }

            let frame = 0;
            const maxFrames = 200;

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;
                pieces.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.rot += p.rv;
                    if (p.y < canvas.height + 20) alive = true;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                });
                frame++;
                if (alive && frame < maxFrames) {
                    requestAnimationFrame(draw);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            draw();

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }
    </script>

    <script src="script.js"></script>
</body>
</html>
